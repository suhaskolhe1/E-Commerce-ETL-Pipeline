name: Daily Data Pipeline

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
      REDSHIFT_HOST: ${{ secrets.REDSHIFT_HOST }}
      REDSHIFT_PORT: ${{ secrets.REDSHIFT_PORT }}
      REDSHIFT_DATABASE: ${{ secrets.REDSHIFT_DATABASE }}
      REDSHIFT_USER: ${{ secrets.REDSHIFT_USER }}
      REDSHIFT_PASSWORD: ${{ secrets.REDSHIFT_PASSWORD }}
      REDSHIFT_IAM_ROLE: ${{ secrets.REDSHIFT_IAM_ROLE }}
      AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
      UPLOAD_TO_S3: 'true'
      RUN_LOCAL: 'false'
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Set up Java for PySpark
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Step 1 - Generate and Upload Data to S3 (Raw Zone)
      run: |
        # In a real scenario, this might be a script that extracts data from a transactional DB
        python ingestion/generate_and_upload.py
        
    - name: Step 2 - Run PySpark Transformations (Processed Zone)
      run: |
        python transformations/spark_etl.py
        
    - name: Step 3 - Load to AWS Redshift
      run: |
        python transformations/load_redshift.py
